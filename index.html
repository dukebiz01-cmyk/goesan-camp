<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#185c42" />
  <meta name="app-version" content="gca-v5.0.2-member-map-fix" />
  <title>괴산캠핑장협회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./css/app.css?v=20260513j" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="login-mode">
  <div class="loader" id="loader"><div class="spin"></div></div>
  <div class="toast" id="toast"></div>
  <div class="version-mark" id="version-mark">GCA v5.0.2 · 회원수/지도 복구</div>

  <section id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">G</div>
        <h1>괴산캠핑장협회</h1>
        <p>협회 운영 · 보조사업 · 괴산여행 정보 허브</p>
      </div>

      <button class="kakao-btn" id="btn-kakao">카카오로 로그인</button>
      <div class="divider">또는</div>

      <label class="field">이메일<input id="login-email" type="email" autocomplete="email" /></label>
      <label class="field">비밀번호<input id="login-password" type="password" autocomplete="current-password" /></label>
      <button class="primary full" id="btn-login">로그인</button>

      <div class="login-error" id="login-error"></div>

      <details class="signup-box">
        <summary>회원/업체 가입신청</summary>
        <div class="signup-grid">
          <label class="field">이름<input id="signup-name" /></label>
          <label class="field">이메일<input id="signup-email" type="email" /></label>
          <label class="field">연락처<input id="signup-phone" /></label>
          <label class="field">신청구분
            <select id="signup-role">
              <option value="member">캠핑장 회원</option>
              <option value="provider">업체/강사</option>
              <option value="county">군청/확인 계정</option>
            </select>
          </label>
          <label class="field">캠핑장명<input id="signup-camp" /></label>
          <label class="field">업체/강사명<input id="signup-provider" /></label>
          <label class="field wide">메모<textarea id="signup-memo"></textarea></label>
          <button class="secondary full" id="btn-signup">가입신청 보내기</button>
        </div>
      </details>
    </div>
  </section>

  <section id="app" class="app">
    <header class="topbar">
      <div>
        <div class="top-title" id="top-title">우리 캠핑장</div>
        <div class="top-sub" id="top-sub">괴산캠핑장협회</div>
      </div>
      <div class="top-actions">
        <span class="user-chip" id="user-chip">-</span>
        <button class="ghost small" id="btn-logout">나가기</button>
      </div>
    </header>

    <div class="member-strip" id="member-strip">
      <div class="member-strip-main">
        <strong id="member-count">-</strong>
        <span>정회원</span>
      </div>
      <div class="member-strip-sub" id="member-breakdown">회원 현황 불러오는 중</div>
    </div>

    <main>
      <section class="page active" id="page-my"></section>
      <section class="page" id="page-notices"></section>
      <section class="page" id="page-vendors"></section>
      <section class="page" id="page-more"></section>
      <section class="page" id="page-admin"></section>
    </main>

   <nav class="bottom-nav" id="bottom-nav">
  <button data-page="my" class="active">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="tl">일정</span>
  </button>
  <button data-page="vendors">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <span class="tl">업체</span>
  </button>
  <button data-page="notices">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="tl">소식</span>
  </button>
  <button data-page="more">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span class="tl">더보기</span>
  </button>
  <button data-page="admin" data-admin-only>
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09c0 .66.39 1.26 1 1.51.61.25 1.32.13 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.46.5-.58 1.21-.33 1.82.25.61.85 1 1.51 1H21a2 2 0 1 1 0 4h-.09c-.66 0-1.26.39-1.51 1z"/></svg>
    <span class="tl">관리</span>
  </button>
</nav>
</section>

  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal" id="modal">
    <div class="modal-head">
      <strong id="modal-title"></strong>
      <button id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./js/router.js?v=20260513e"></script>
</body>
</html>
