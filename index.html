<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#185c42" />
  <meta name="app-version" content="gca-v5.0.2-member-map-fix" />
  <title>괴산캠핑장협회</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./css/app.css?v=20260513j" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="괴산캠협" />
</head>
<body class="login-mode">
  <div class="loader" id="loader"><div class="spin"></div></div>
  <div class="toast" id="toast"></div>
  <div class="version-mark" id="version-mark">GCA v5.0.2 · 회원수/지도 복구</div>

  <section id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">G</div>
        <h1>괴산캠핑장협회</h1>
        <p>협회 운영 시스템</p>
      </div>

      <label class="field">휴대폰 번호
        <input id="login-phone" type="tel" inputmode="numeric"
               placeholder="010-1234-5678" autocomplete="tel" />
      </label>
      <label class="field">캠핑장명
        <select id="login-camp">
          <option value="">캠프명 선택</option>
        </select>
      </label>
      <label class="field">비밀번호 (숫자 6자리)
        <input id="login-password" type="password" inputmode="numeric"
               maxlength="6" pattern="\d{6}"
               autocomplete="current-password" placeholder="• • • • • •" />
      </label>
      <button class="primary full" id="btn-login-phone">로그인</button>

      <!-- PWA 설치 버튼 (조건부 표시) -->
      <button id="btn-install-pwa" style="display:none;width:100%;background:white;color:#0F4C3A;border:2px solid #0F4C3A;padding:13px;font-weight:700;border-radius:10px;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:14px;margin-top:10px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        앱으로 설치하기
      </button>

      <!-- 새로고침 버튼 -->
      <button id="btn-refresh-cache" onclick="location.href=location.pathname+'?t='+Date.now()" style="display:flex;width:100%;background:white;color:#6B7280;border:1.5px solid #D1D5DB;padding:11px;font-weight:700;border-radius:10px;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;margin-top:8px">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        새로고침
      </button>

      <div class="login-error" id="login-error"></div>

      <p class="login-help muted" style="margin-top:14px;font-size:13px;line-height:1.6">
        처음 사용하시나요? 운영팀에 카톡으로 휴대폰 번호 알려주시면<br>
        등록 후 안내해 드립니다.
      </p>

      <details class="admin-login" style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px">
        <summary style="cursor:pointer;color:var(--muted);font-size:13px">관리자 로그인 (이메일)</summary>
        <div style="margin-top:10px">
          <label class="field">이메일
            <input id="login-email" type="email" autocomplete="email" />
          </label>
          <label class="field">비밀번호
            <input id="login-admin-password" type="password" autocomplete="current-password" />
          </label>
          <button class="secondary full" id="btn-login">관리자 로그인</button>
        </div>
      </details>

      <button class="kakao-btn" id="btn-kakao" style="display:none">카카오로 로그인</button>

      <details class="signup-box" style="margin-top:18px">
        <summary style="cursor:pointer">회원/업체 가입신청</summary>
        <div class="signup-grid">
          <label class="field">이름<input id="signup-name" /></label>
          <label class="field">휴대폰<input id="signup-phone" type="tel" inputmode="numeric" placeholder="010-1234-5678" /></label>
          <label class="field">캠핑장<input id="signup-camp" /></label>
          <label class="field">신청구분
            <select id="signup-role">
              <option value="member">캠핑장 회원</option>
              <option value="provider">업체/강사</option>
              <option value="county">군청/확인 계정</option>
            </select>
          </label>
          <label class="field">이메일 (선택)<input id="signup-email" type="email" /></label>
          <label class="field">업체/강사명<input id="signup-provider" /></label>
          <label class="field wide">메모<textarea id="signup-memo"></textarea></label>
          <button class="secondary full" id="btn-signup">가입신청 보내기</button>
        </div>
      </details>
    </div>
  </section>

  <section id="app" class="app">
    <header class="topbar">
      <div>
        <div class="top-title" id="top-title">우리 캠핑장</div>
        <div class="top-sub" id="top-sub">괴산캠핑장협회</div>
      </div>
      <div class="top-actions">
        <span class="user-chip" id="user-chip">-</span>
        <button class="ghost small" id="btn-logout">나가기</button>
      </div>
    </header>

    <div class="member-strip" id="member-strip">
      <div class="member-strip-main">
        <strong id="member-count">-</strong>
        <span>정회원</span>
      </div>
      <div class="member-strip-sub" id="member-breakdown">회원 현황 불러오는 중</div>
    </div>

    <main>
      <section class="page active" id="page-my"></section>
      <section class="page" id="page-notices"></section>
      <section class="page" id="page-vendors"></section>
      <section class="page" id="page-more"></section>
      <section class="page" id="page-admin"></section>
    </main>

   <nav class="bottom-nav" id="bottom-nav">
  <button data-page="my" class="active">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="tl">일정</span>
  </button>
  <button data-page="vendors">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <span class="tl">업체</span>
  </button>
  <button data-page="notices">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="tl">소식</span>
  </button>
  <button data-page="more">
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span class="tl">더보기</span>
  </button>
  <button data-page="admin" data-admin-only>
    <svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09c0 .66.39 1.26 1 1.51.61.25 1.32.13 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.46.5-.58 1.21-.33 1.82.25.61.85 1 1.51 1H21a2 2 0 1 1 0 4h-.09c-.66 0-1.26.39-1.51 1z"/></svg>
    <span class="tl">관리</span>
  </button>
</nav>
</section>

  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal" id="modal">
    <div class="modal-head">
      <strong id="modal-title"></strong>
      <button id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./js/router.js?v=20260513m"></script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW 등록:', reg.scope))
          .catch(err => console.warn('⚠️ SW 등록 실패:', err));
      });
    }
  </script>

  <!-- PWA 설치 버튼 처리 -->
  <script>
    (function() {
      let deferredPrompt = null;
      const installBtn = document.getElementById('btn-install-pwa');
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isKakao = /KAKAOTALK/i.test(navigator.userAgent);

      function showBtn() {
        if (installBtn && !isStandalone) installBtn.style.display = 'flex';
      }
      function hideBtn() {
        if (installBtn) installBtn.style.display = 'none';
      }

      // iOS/카톡: prompt 미지원이지만 안내 위해 표시
      if ((isIOS || isKakao) && !isStandalone) showBtn();

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        showBtn();
      });

      window.addEventListener('appinstalled', () => {
        hideBtn();
        console.log('✅ PWA 설치 완료');
      });

      installBtn?.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          if (outcome === 'accepted') hideBtn();
        } else if (isKakao) {
          alert('카카오톡 브라우저는 앱 설치를 지원하지 않습니다.\n\n우상단 ⋮ → "다른 브라우저로 열기" → Chrome 선택 후 다시 시도하세요.');
        } else if (isIOS) {
          alert('아이폰 설치 방법\n\n1. 화면 아래 공유 버튼 누르기\n2. "홈 화면에 추가" 선택\n3. 우상단 "추가" 누르기');
        } else {
          alert('크롬 설치 방법\n\n우상단 ⋮ 메뉴 → "앱 설치" 또는 "홈 화면에 추가"');
        }
      });
    })();
  </script>
</body>
</html>
